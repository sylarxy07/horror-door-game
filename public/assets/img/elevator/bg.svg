<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="55%" stop-color="#101722"/>
      <stop offset="100%" stop-color="#090d14"/>
    </linearGradient>
    <linearGradient id="hallGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f5ff" stop-opacity=".22"/>
      <stop offset="35%" stop-color="#9bb0c4" stop-opacity=".09"/>
      <stop offset="100%" stop-color="#0d141f" stop-opacity=".2"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".88" numOctaves="2" seed="23"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 .07"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>

  <rect x="280" y="80" width="1040" height="740" fill="url(#hallGlow)" opacity=".85"/>
  <rect x="340" y="120" width="920" height="660" fill="none" stroke="#dbe5ef" stroke-opacity=".1" stroke-width="2"/>

  <rect x="450" y="120" width="40" height="660" fill="#f3f8ff" opacity=".09"/>
  <rect x="560" y="120" width="18" height="660" fill="#f3f8ff" opacity=".06"/>
  <rect x="1022" y="120" width="18" height="660" fill="#f3f8ff" opacity=".06"/>
  <rect x="1110" y="120" width="40" height="660" fill="#f3f8ff" opacity=".09"/>

  <rect x="780" y="120" width="40" height="660" fill="#a8bacd" opacity=".05"/>
  <rect x="0" y="700" width="1600" height="200" fill="#070b12" opacity=".55"/>

  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
