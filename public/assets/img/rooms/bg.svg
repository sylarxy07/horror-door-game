<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242c37"/>
      <stop offset="100%" stop-color="#131922"/>
    </linearGradient>
    <pattern id="concreteGrid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <path d="M0 40 H120 M0 84 H120 M34 0 V120 M82 0 V120" stroke="#b8c4cf" stroke-opacity=".06" stroke-width="1"/>
      <circle cx="18" cy="20" r="2.5" fill="#d6dfe8" fill-opacity=".06"/>
      <circle cx="94" cy="52" r="1.8" fill="#d6dfe8" fill-opacity=".05"/>
      <circle cx="64" cy="104" r="2.2" fill="#d6dfe8" fill-opacity=".04"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" seed="19"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 .1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#wall)"/>
  <rect width="1600" height="900" fill="url(#concreteGrid)"/>

  <rect x="0" y="0" width="1600" height="220" fill="#e7eef5" opacity=".04"/>
  <rect x="0" y="620" width="1600" height="280" fill="#0b111a" opacity=".5"/>
  <rect x="220" y="120" width="1160" height="540" fill="none" stroke="#e1e9f0" stroke-opacity=".06" stroke-width="2"/>

  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
